defaults:
  - /storage: lmdb

_target_: maxyfold.data.datamodules.pdb_datamodule.PDBDataModule

# DataBackend
backend: ${storage}

# Split paths
train_keys_path: ${paths.train_keys_path}
val_keys_path: ${paths.val_keys_path}
test_keys_path: ${paths.test_keys_path}

# DataLoader params
batch_size: 16
num_workers: 8
pin_memory: True

# Cropper params
cropper:
  _target_: maxyfold.data.cropping.croppers.ContiguousCropper
  crop_size: 384
  # pad_token_id is 0 by default
  ligand_prob: 0.5